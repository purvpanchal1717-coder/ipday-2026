<!DOCTYPE html>
<html>
<head>
<title>Robotics - IP Day</title>

<style>

/* Smooth fade-in animation */
.fade-in {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

body {
    transition: opacity 0.3s ease;
}

.fade-out {
    opacity: 0;
}

/* Button hover effect */
.btn {
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #00f0ff;
}

/* Card animation */
.card {
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-12px) scale(1.03);
}
body {
    margin:0;
    font-family:Segoe UI;
    color:white;
    text-align:center;

    /* BACKGROUND FIX */
    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.95)),
    url('bck.jpg') center/cover no-repeat fixed;

    animation: fadeIn 0.6s ease;
}

/* ANIMATION */
@keyframes fadeIn {
    from { opacity:0; transform: translateY(20px); }
    to { opacity:1; transform: translateY(0); }
}

.container {
    padding:100px 20px;
}

.card {
    background:rgba(0,0,0,0.7);
    padding:20px;
    margin:20px auto;
    width:90%;
    max-width:500px;
    border-radius:12px;
    transition:0.3s;
    border:1px solid rgba(0,240,255,0.2);
}

.card:hover {
    transform:scale(1.05);
    box-shadow:0 0 20px #00f0ff;
}

h1 {
    color:#00f0ff;
    text-shadow:0 0 15px #00f0ff;
}

h2 {
    color:#00f0ff;
}

a {
    text-decoration:none;
    color:white;
}

.back {
    display:inline-block;
    margin-top:20px;
    color:#00f0ff;
}

.reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.8s ease;
}

.reveal.active {
    opacity: 1;
    transform: translateY(0);
}
.cursor-glow {
    position: fixed;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, #00f0ff55, transparent);
    pointer-events: none;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
}

</style>
</head>

<body>

<div class="container">

<h1>🤖 Robotics Events</h1>

<a href="linefollower.html">
    <div class="card">
        <h2>Line Follower</h2>
        <p>Click to view full rules</p>
    </div>
</a>

<a href="roborace.html">
    <div class="card">
        <h2>Robo Race</h2>
        <p>Click to view full rules</p>
    </div>
</a>

<a href="index.html" class="back">⬅ Back to Home</a>

</div>

<script>
document.querySelectorAll("a").forEach(link => {
    if (link.href && !link.target) {
        link.addEventListener("click", function(e) {
            e.preventDefault();
            document.body.classList.add("fade-out");
            setTimeout(() => {
                window.location = this.href;
            }, 300);
        });
    }
});
</script>

<script>
const glow = document.createElement("div");
glow.classList.add("cursor-glow");
document.body.appendChild(glow);

document.addEventListener("mousemove", e => {
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>
