<!DOCTYPE html>
<html>
<head>
<title>Robotics - IP Day</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GLOBAL FIX */
* { box-sizing: border-box; }

html, body {
    margin:0;
    overflow-x:hidden;
}

/* BODY */
body {
    font-family:'Segoe UI', sans-serif;
    color:white;
    text-align:center;

    background:
    linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95)),
    url('bck.jpg') center/cover no-repeat;
}

/* BACK BUTTON */
.back-btn {
    position:fixed;
    top:20px;
    left:20px;
    background:#00f0ff;
    color:black;
    padding:10px 15px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 0 10px #00f0ff;
    z-index:1000;
}

/* CONTAINER */
.container {
    padding:80px 15px;
}

/* CARDS */
.card {
    background:rgba(0,0,0,0.6);
    padding:20px;
    margin:20px auto;
    width:100%;
    max-width:500px;
    border-radius:12px;
    border:1px solid #00f0ff33;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-8px);
    box-shadow:0 0 20px #00f0ff;
}

/* HEADINGS */
h1 {
    color:#00f0ff;
    margin-bottom:30px;
}

h2 {
    color:#00f0ff;
}

/* MOBILE */
@media (max-width:768px){

    .container {
        padding:60px 10px;
    }

    .card {
        width:100%;
        max-width:95%;
        margin:15px auto;
        padding:18px;
    }

    h1 { font-size:26px; }
    h2 { font-size:18px; }
    p { font-size:14px; }

    .back-btn {
        top:10px;
        left:10px;
        padding:8px 12px;
        font-size:12px;
    }
}

</style>
</head>

<body>

<a href="index.html" class="back-btn">⬅ Back</a>

<div class="container">

<h1>🤖 Robotics Events</h1>

<a href="linefollower.html">
    <div class="card">
        <h2>Line Follower</h2>
        <p>Click to view full rules</p>
    </div>
</a>

<a href="roborace.html">
    <div class="card">
        <h2>Robo Race</h2>
        <p>Click to view full rules</p>
    </div>
</a>

</div>

<script>
document.querySelectorAll("a").forEach(link => {
    if (link.href && !link.target) {
        link.addEventListener("click", function(e) {
            e.preventDefault();
            document.body.style.opacity = 0;
            setTimeout(() => {
                window.location = this.href;
            }, 300);
        });
    }
});
</script>

</body>
</html>
